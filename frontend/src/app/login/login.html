<div class="min-h-screen bg-neutral-950 text-neutral-200 flex items-center justify-center p-6 font-sans">
  <div class="w-full max-w-sm bg-neutral-900/40 border border-neutral-900 p-8 rounded-3xl backdrop-blur-xl shadow-2xl">

    <div class="mb-8">
      <a routerLink="/" class="text-xs text-neutral-500 hover:text-neutral-300 transition-colors">← Back to home</a>
      <h2 class="text-2xl font-light text-white tracking-tight mt-4">
        {{ isLogin ? 'Welcome back' : 'Create an account' }}
      </h2>
      <p class="text-xs text-neutral-500 mt-1">Enter your credentials to access the ecosystem.</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-[11px] uppercase tracking-wider font-medium text-neutral-400 mb-1.5">Email
          Address</label>
        <input [(ngModel)]="email" name="email" type="email" required
          class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-700 focus:ring-1 focus:ring-neutral-700 transition-all">
      </div>

      <div>
        <label class="block text-[11px] uppercase tracking-wider font-medium text-neutral-400 mb-1.5">Password</label>
        <input [(ngModel)]="password" name="password" type="password" required
          class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-700 focus:ring-1 focus:ring-neutral-700 transition-all">
      </div>

      <ng-container *ngIf="!isLogin">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="firstName" name="firstName" required placeholder="First Name" class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-700 focus:ring-1 focus:ring-neutral-700 transition-all">
        </div>

        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="lastName" name="lastName" required placeholder="Last Name"class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-700 focus:ring-1 focus:ring-neutral-700 transition-all">
        </div>

        <div class="form-group">
          <label>Username</label>
          <input type="text" [(ngModel)]="username" name="username" required placeholder="Choose a username"class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-700 focus:ring-1 focus:ring-neutral-700 transition-all">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" [(ngModel)]="phoneNumber" name="phoneNumber" required placeholder="Enter phone number"class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-700 focus:ring-1 focus:ring-neutral-700 transition-all">
        </div>

        <div class="form-group">
          <label>Referral Code (Optional)</label>
          <input type="text" [(ngModel)]="referralCode" name="referralCode" placeholder="6-digit code"class="w-full bg-neutral-950 border border-neutral-800 rounded-xl px-4 py-3 text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-neutral-700 focus:ring-1 focus:ring-neutral-700 transition-all">
        </div>
      </ng-container>

      <button type="submit"
        class="w-full bg-white text-black text-sm font-medium py-3 rounded-xl hover:bg-neutral-200 transition-all duration-200 mt-6 shadow-sm">
        {{ isLogin ? 'Continue' : 'Register' }}
      </button>
    </form>

    <div class="mt-6 text-center">
      <button (click)="isLogin = !isLogin" class="text-xs text-neutral-500 hover:text-white transition-colors">
        {{ isLogin ? "Don't have an account? Sign up" : "Already have an account? Sign in" }}
      </button>
    </div>

  </div>
</div>
