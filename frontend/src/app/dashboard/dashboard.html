<div class="min-h-screen bg-neutral-950 text-neutral-100 font-sans antialiased">
  <!-- Dynamic Role-Based View Switcher Wrapper -->
  <ng-container [ngSwitch]="userRole">
    
    <!-- Render the complete administrative console if the user is an ADMIN -->
    <app-admin *ngSwitchCase="'ADMIN'"></app-admin>

    <!-- Render the core workshop schedule workspace if the user is an OFFICE operator -->
    <app-office *ngSwitchCase="'OFFICE'"></app-office>

    <!-- Fallback structural handling context indicator layer -->
    <div *ngSwitchDefault class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
      <div class="w-12 h-12 rounded-full border border-neutral-800 flex items-center justify-center mb-4 animate-pulse">
        <span class="text-xs font-mono text-neutral-500">...</span>
      </div>
      <h3 class="text-sm font-medium text-white mb-1">Evaluating Access Privileges</h3>
      <p class="text-xs text-neutral-400 max-w-xs leading-relaxed mb-4">
        Please wait while the console synchronizes your role credentials with the security subsystem.
      </p>
      <button (click)="logout()" class="text-xs text-neutral-500 hover:text-white transition-colors cursor-pointer underline underline-offset-4">
        Return to Login
      </button>
    </div>

  </ng-container>
</div>
